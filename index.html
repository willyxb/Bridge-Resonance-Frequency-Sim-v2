<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Bridge Resonance Simulation</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Header Section -->
        <header class="header panel">
            <h1>Bridge Resonance Simulation</h1>
        </header>

        <!-- Controls Section -->
        <section class="controls panel">
            <h2>Simulation Controls</h2>
            
            <div class="control-group tooltip" data-tooltip="Frequency of the external periodic driving force">
                <label for="slideForcingFreq">Forcing Frequency (<span id="valForcingFreq">1.0</span> Hz)</label>
                <input type="range" id="slideForcingFreq" min="0.1" max="3.0" step="0.05" value="1.0">
            </div>

            <div class="control-group tooltip" data-tooltip="Amplitude of the external driving force">
                <label for="slideForceAmp">Force Amplitude (<span id="valForceAmp">500</span> N)</label>
                <input type="range" id="slideForceAmp" min="0" max="2000" step="50" value="500">
            </div>

            <div class="control-group tooltip" data-tooltip="Damping coefficient 'c' - Energy lost to friction/air resistance">
                <label for="slideDamping">Damping Coefficient (<span id="valDamping">20</span> kg/s)</label>
                <input type="range" id="slideDamping" min="0" max="200" step="2" value="20">
            </div>

            <div class="control-group tooltip" data-tooltip="Mass of the bridge deck">
                <label for="slideMass">Bridge Mass (<span id="valMass">1000</span> kg)</label>
                <input type="range" id="slideMass" min="500" max="5000" step="100" value="1000">
            </div>

            <div class="control-group tooltip" data-tooltip="Stiffness 'k' - Resistance to deformation">
                <label for="slideStiffness">Stiffness / Spring Constant (<span id="valStiffness">40000</span> N/m)</label>
                <input type="range" id="slideStiffness" min="10000" max="100000" step="1000" value="40000">
            </div>

            <div class="button-group">
                <button id="btnToggleSim" class="btn primary">Start</button>
                <button id="btnResetSim" class="btn secondary">Reset</button>
            </div>
            
            <div class="button-group">
                <button id="btnToggleDamping" class="btn outline">Toggle Damping</button>
                <button id="btnToggleWind" class="btn outline">Wind Noise: OFF</button>
            </div>

            <div class="advanced-controls">
                <h3>Presets</h3>
                <button id="btnTacoma" class="btn warning tooltip" data-tooltip="Loads parameters prone to resonance, similar to the conditions of the Tacoma Narrows Bridge collapse">Tacoma Narrows Preset</button>
            </div>
            
            <div class="stats-box">
                <p>Natural Frequency: <span id="statNatFreq">1.00</span> Hz</p>
                <p>Current Amplitude: <span id="statAmp">0.00</span> m</p>
            </div>
        </section>

        <!-- Visualization Section -->
        <section class="visualization panel">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="bridgeCanvas"></canvas>
                <div id="failureOverlay" class="hidden">
                    <h2>STRUCTURAL FAILURE</h2>
                    <p>Critical amplitude exceeded.</p>
                    <button id="btnResetFailure">Rebuild Bridge</button>
                </div>
            </div>
        </section>
    </div>

    <script src="physics.js"></script>
    <script src="app.js"></script>
</body>
</html>
